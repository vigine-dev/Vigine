name: CI

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  graph-purity:
    name: Graph-core purity check (INV-9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run check_graph_purity
        run: python scripts/check_graph_purity.py --root .

  naming-convention:
    name: Naming convention check (INV-10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run check_naming_convention
        run: python scripts/check_naming_convention.py --root .

  unit-tests-scripts:
    name: Script unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      - name: Run test_check_graph_purity
        run: pytest test/scripts/test_check_graph_purity.py -q

      - name: Run test_check_naming_convention
        run: pytest test/scripts/test_check_naming_convention.py -q

  # Three-OS build matrix. Every cell runs a Debug and a Release build
  # under the project baseline (CMake 3.25, C++23, Vulkan 1.3). vcpkg
  # caches are keyed per-OS and per vcpkg.json hash so a lockfile bump
  # invalidates only the affected slice.
  #
  # ASAN / UBSAN / TSAN jobs to be added in the sanitizer-matrix change.
  build:
    name: Build ${{ matrix.os }} ${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, ubuntu-22.04, macos-13]
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/build/vcpkg_installed
          key: vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}
