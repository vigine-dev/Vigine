name: CI

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  graph-purity:
    name: Graph-core purity check (INV-9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run check_graph_purity
        run: python script/check_graph_purity.py --root .

  naming-convention:
    name: Naming convention check (INV-10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run check_naming_convention
        run: python script/check_naming_convention.py --root .

  wrapper-encapsulation:
    name: Wrapper encapsulation check (INV-11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run check_wrapper_encapsulation
        run: python script/check_wrapper_encapsulation.py --root .

  strict-encapsulation:
    name: Strict encapsulation check (INV-12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run check_strict_encapsulation
        run: python script/check_strict_encapsulation.py --root .

  cross-platform-check:
    name: Cross-platform portability check (AD-2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run check_cross_platform
        run: python script/check_cross_platform.py --root .

  unit-tests-scripts:
    name: Script unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      - name: Run test_check_graph_purity
        run: pytest test/script/test_check_graph_purity.py -q

      - name: Run test_check_naming_convention
        run: pytest test/script/test_check_naming_convention.py -q

      - name: Run test_check_wrapper_encapsulation
        run: pytest test/script/test_check_wrapper_encapsulation.py -q

      - name: Run test_check_strict_encapsulation
        run: pytest test/script/test_check_strict_encapsulation.py -q

      - name: Run test_check_cross_platform
        run: pytest test/script/test_check_cross_platform.py -q

  # Three-OS build matrix. Every cell runs a Debug and a Release build
  # under the project baseline (CMake 3.25, C++23, Vulkan 1.3). vcpkg
  # caches are keyed per-OS and per vcpkg.json hash so a lockfile bump
  # invalidates only the affected slice.
  #
  # ASAN / UBSAN / TSAN jobs to be added in the sanitizer-matrix change.
  build:
    name: Build ${{ matrix.os }} ${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, ubuntu-22.04, macos-13]
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg_installed
        uses: actions/cache@v4
        with:
          # Only `build/vcpkg_installed` is a real cacheable path. The
          # repo ships `vcpkg.json` manifest-mode but does not vendor
          # a `vcpkg/` directory — previously listing `$GITHUB_WORKSPACE
          # /vcpkg` here stored an empty directory on every run and
          # confused the cache accounting. Drop it.
          path: ${{ github.workspace }}/build/vcpkg_installed
          key: vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-

      # The root CMake requires Vulkan (1.3 preferred, 1.2 fallback) and,
      # with `ENABLE_POSTGRESQL=ON`, libpqxx. Default GitHub images ship
      # neither. Install Vulkan per OS and turn PostgreSQL off so the
      # matrix does not block on a vcpkg-gated libpqxx step. Enabling
      # PostgreSQL is a scoped follow-up that lands once the vcpkg
      # toolchain is wired into the matrix.
      - name: Install Vulkan SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libvulkan-dev vulkan-validationlayers-dev glslang-tools

      - name: Install Vulkan SDK (Windows / macOS)
        if: runner.os == 'Windows' || runner.os == 'macOS'
        uses: humbletim/install-vulkan-sdk@v1.1.1
        with:
          version: 1.3.290.0
          cache: true

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.config }}
          -DENABLE_POSTGRESQL=OFF
          -DVIGINE_ENABLE_EXPERIMENTAL=OFF
          -DENABLE_UNITTEST=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --build-config ${{ matrix.config }}
