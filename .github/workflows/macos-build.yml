name: macOS build

on:
  push:
    branches: ["main", "feat/**", "feature/**"]
  pull_request:
    branches: ["main", "feature/**"]

jobs:
  macos-build:
    name: macOS ${{ matrix.config }} (Apple Clang + Vulkan)
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # The engine's root CMake calls find_package(Vulkan) unconditionally,
      # so the SDK must be available even when example/window is disabled
      # below.
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.1.1
        with:
          version: 1.3.290.0
          cache: true

      # example/window's source uses <windows.h> without a CMake-level
      # skip-guard, so on macOS we keep ENABLE_EXAMPLE=ON to exercise the
      # example-tree wiring but disable the window slot via
      # BUILD_EXAMPLE_WINDOW=OFF. The CMake skip-guard for the window
      # example is tracked in #299. The other three slots
      # (threaded_bus / parallel_fsm / fanout_fsm) are EXISTS-guarded in
      # example/CMakeLists.txt, so flipping them ON is a safe no-op until
      # the stubs become real. vcpkg toolchain is not wired here because
      # VIGINE_ENABLE_EXPERIMENTAL=OFF gates the only current consumer
      # (libpqxx); re-add a cache step when manifest dependencies become
      # required outside the experimental umbrella.
      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.config }}
          -DENABLE_UNITTEST=ON
          -DENABLE_EXAMPLE=ON
          -DBUILD_EXAMPLE_WINDOW=OFF
          -DBUILD_EXAMPLE_THREADED_BUS=ON
          -DBUILD_EXAMPLE_PARALLEL_FSM=ON
          -DBUILD_EXAMPLE_FANOUT_FSM=ON
          -DVIGINE_ENABLE_EXPERIMENTAL=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Run ctest
        working-directory: build
        run: ctest --output-on-failure -C ${{ matrix.config }}
