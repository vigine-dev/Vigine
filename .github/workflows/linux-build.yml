name: Linux build

on:
  push:
    branches: ["main", "feat/**", "feature/**"]
  pull_request:
    branches: ["main", "feature/**"]

jobs:
  linux-build:
    name: Ubuntu 22.04 ${{ matrix.config }} (XCB + Vulkan + full ctest)
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            cmake \
            libxcb1-dev \
            libxcb-util0-dev \
            libvulkan-dev \
            vulkan-validationlayers-dev \
            libpqxx-dev \
            libglm-dev \
            googletest \
            libgtest-dev

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.config }}
          -DENABLE_UNITTEST=ON
          -DENABLE_EXAMPLE=OFF
          -DVIGINE_ENABLE_EXPERIMENTAL=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.config }} -- -j$(nproc)

      - name: Run ctest
        working-directory: build
        run: ctest --output-on-failure -C ${{ matrix.config }}
